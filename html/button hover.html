<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Hover Effect</title>
    <style>
        body{
            background:#060c21;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .btn{
            margin: 20px;
            padding: 15px 60px;
            cursor: pointer;
        }
        .btn1{
            background-color: transparent;
            border: 3px solid #ff00d4;
            border-radius: 50px;
            -webkit-transition: all 0.15s ease-in-out;
            transition: all 0.15s ease-in-out;
            color: #ff00d4;
        }
        .btn1:hover{
            box-shadow: 0 0 10px 0 #ff00d4 inset, 0 0 20px
             2px #ff00d4;
        }
        .btn2{
            border: 3px solid #fff;
            border-radius: 50px;
            background-image: linear-gradient(30deg, #0004ff 50%,
            transparent 50%);
            background-size: 500px;
            background-repeat: no-repeat;
            background-position: 0%;
            -webkit-transition: background 300ms ease-in-out;
            transition: background 300ms ease-in-out;
        }
        .btn2:hover{
            background-position: 100%;
            transition: 1.5s;
            color: #0004ff;
            border: 3px solid #0004ff;
        }
        .btn3{
            border: 2px solid #3c73ff;
            border-radius: 50px;
            background-color: #3c73ff;
            color: #fff;
            transition: 0.3s;
        }
        .btn3:hover{
            box-shadow: 8px 8px #99bdff;
            transition: 0.6s;
        }
        .btn4{
            background-color: transparent;
            border: 3px solid #ff0251;
            border-radius: 50px;
            color: #ff0251;
            transition: 0.6s;
        }
        .btn4:hover{
            animation: pluse 1s infinite;
            transition: 0.6s;
        }
        @keyframes pluse{
            0%{
                scale: 1;
            }
            60%{
                scale: 0.9;
            }
            100%{
                scale: 1;
            }
        }
    </style>
</head>
<body>
    <div class="btn btn1">Neon</div>
    <div class="btn btn2">CLICK ME</div>
    <div class="btn btn3">Shadow</div>
    <div class="btn btn4">pulse</div>
</body>
</html>
